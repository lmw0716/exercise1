name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:

    runs-on: ubuntu-latest
    container:
      image: darkrsw/2026-ds-exercise1:latest

    steps:
    - uses: actions/checkout@v4
    - name: copy files.
      run: cp /app/ctest.cpp ./
    - name: compile
      run: g++ -o ctest.o ctest.cpp
    - name: run with time
      run: /usr/bin/time -v ./ctest.o
    
